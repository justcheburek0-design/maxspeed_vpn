name: maxspeed_vpn
description: "MaxSpeedVPN — fast, modern VPN client built with Flutter + sing-box"
publish_to: 'none'
version: 1.4.19+31

environment:
  sdk: ^3.9.2
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  package_info_plus: ^8.0.0
  http: ^1.2.0
  # Android-only — imported conditionally in vpn_service_android.dart
  flutter_singbox_client: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
