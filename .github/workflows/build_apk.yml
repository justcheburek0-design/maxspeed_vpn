name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/*.md'
  workflow_dispatch:

jobs:
  # ─── Lint & Format Check ───────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting (dart format)
        run: dart format --set-exit-if-changed --output=none lib/ test/

      - name: Static analysis (dart analyze)
        run: dart analyze --fatal-infos lib/ test/

  # ─── Android APK ───────────────────────────────
  build-android:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/maxspeed-release.keystore
          echo "Keystore decoded: $(ls -la android/app/maxspeed-release.keystore)"

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.vfs.watch=false -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m"
          JAVA_TOOL_OPTIONS: "-Dorg.gradle.vfs.watch=false"
          KEYSTORE_PATH: "maxspeed-release.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts (split)
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build/app/outputs/apk/release/*.apk

  # ─── Linux Desktop ─────────────────────────────
  build-linux:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-0 libsecret-1-dev libnotify4 libnss3 libgbm-dev xdg-utils

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux binary
        run: |
          BIN="build/linux/x64/release/bundle/maxspeed_vpn"
          cp "$BIN" /tmp/maxspeed_vpn-linux-x64
          chmod +x /tmp/maxspeed_vpn-linux-x64
          echo "Binary size: $(du -h /tmp/maxspeed_vpn-linux-x64 | cut -f1)"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: /tmp/maxspeed_vpn-linux-x64

  # ─── Windows Desktop ───────────────────────────
  build-windows:
    needs: lint
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Build Windows
        run: |
          flutter build windows --release
          Write-Output "=== .exe files ==="
          Get-ChildItem -Recurse build\windows\ -Filter *.exe -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          Write-Output "=== .dll files ==="
          Get-ChildItem -Recurse build\windows\ -Filter *.dll -ErrorAction SilentlyContinue | Select-Object -First 10 | ForEach-Object { $_.FullName }
          Write-Output "=== runner/Release ==="
          Get-ChildItem build\windows\x64\runner\Release\ -ErrorAction SilentlyContinue | ForEach-Object { "$($_.FullName) ($($_.Length))" }

      - name: Package as zip
        shell: powershell
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) {
            Write-Output "ERROR: Build output not found at $src"
            Get-ChildItem -Recurse build\windows\ -ErrorAction SilentlyContinue | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }
          $dest = "$env:TEMP\maxspeed_vpn-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest -Force
          Write-Output "ARCHIVE_PATH=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Output "Package size: $((Get-Item $dest).Length / 1MB) MB"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.ARCHIVE_PATH }}

  # ─── macOS Desktop (arm64 + x86_64) ──────────
  build-macos:
    needs: lint
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      # Build arm64 (disable Metal for broader compatibility)
      - name: Build macOS arm64
        run: |
          export FLUTTER_MACOS_ENABLE_METAL=0
          flutter build macos --release

      - name: Package arm64 dmg
        run: |
          APP=""
          for p in "build/macos/Build/Products/Release/maxspeed_vpn.app" "build/macos/Build/Products/Release/Runner.app"; do
            if [ -d "$p" ]; then APP="$p"; break; fi
          done
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found"
            find build/macos/Build/Products/Release -maxdepth 2 -type d 2>/dev/null
            exit 1
          fi
          echo "Found app at: $APP"
          hdiutil create -volname "MaxSpeedVPN" -srcfolder "$APP" -ov -format UDZO /tmp/maxspeed_vpn-macos-arm64.dmg
          echo "arm64 dmg size: $(du -h /tmp/maxspeed_vpn-macos-arm64.dmg | cut -f1)"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: /tmp/maxspeed_vpn-macos-arm64.dmg

      # Build x86_64 via Rosetta
      - name: Clean for x86_64 rebuild
        run: rm -rf build/macos/Build/Products/Release

      - name: Build macOS x86_64
        run: |
          export FLUTTER_MACOS_ENABLE_METAL=0
          arch -x86_64 flutter build macos --release

      - name: Package x86_64 dmg
        run: |
          APP=""
          for p in "build/macos/Build/Products/Release/maxspeed_vpn.app" "build/macos/Build/Products/Release/Runner.app"; do
            if [ -d "$p" ]; then APP="$p"; break; fi
          done
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found for x86_64"
            find build/macos/Build/Products/Release -maxdepth 2 -type d 2>/dev/null
            exit 1
          fi
          echo "Found app at: $APP"
          hdiutil create -volname "MaxSpeedVPN" -srcfolder "$APP" -ov -format UDZO /tmp/maxspeed_vpn-macos-x86_64.dmg
          echo "x86_64 dmg size: $(du -h /tmp/maxspeed_vpn-macos-x86_64.dmg | cut -f1)"

      - name: Upload macOS x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-release
          path: /tmp/maxspeed_vpn-macos-x86_64.dmg

  # ─── iOS ───────────────────────────────────────
  build-ios:
    needs: lint
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install iOS deps
        run: |
          cd ios
          # Generate Podfile if it doesn't exist (first run on fresh checkout)
          if [ ! -f Podfile ]; then
            flutter pub get
            # Podfile should be generated by flutter, but if not, create minimal one
            if [ ! -f Podfile ]; then
              cat > Podfile << 'EOF'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          project 'Runner', { 'Debug' => :debug, 'Profile' => :release, 'Release' => :release }
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            raise "#{generated_xcode_build_settings_path} must exist" unless File.exist?(generated_xcode_build_settings_path)
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found"
          end
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_ios_podfile_setup
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
            fi
          fi
          pod install --repo-update
          cd ..

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package as zip
        run: |
          RUNNER=""
          for p in "build/ios/iphoneos/Runner.app" "build/ios/Release-iphoneos/Runner.app"; do
            if [ -d "$p" ]; then RUNNER="$p"; break; fi
          done
          if [ -z "$RUNNER" ]; then
            echo "ERROR: Runner.app not found. Contents:"
            find build/ios -maxdepth 3 -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "Found Runner.app at: $RUNNER"
          PAYLOAD_DIR="/tmp/ios_payload/Payload"
          rm -rf /tmp/ios_payload
          mkdir -p "$PAYLOAD_DIR"
          cp -a "$RUNNER" "$PAYLOAD_DIR/Runner.app"
          (cd /tmp/ios_payload && zip -r /tmp/maxspeed_vpn-ios.zip Payload)
          rm -rf /tmp/ios_payload
          echo "Package size: $(du -h /tmp/maxspeed_vpn-ios.zip | cut -f1)"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: /tmp/maxspeed_vpn-ios.zip

  # ─── Web ───────────────────────────────────────
  build-web:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  # ─── Release ───────────────────────────────────
  release:
    needs: [build-android, build-linux, build-windows, build-macos, build-ios, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Check if release exists
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist, will create"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG"..HEAD | sed 's/^/- /')
          else
            CHANGES=$(git log --oneline --max-count=10 | sed 's/^/- /')
          fi
          delimiter="ghadelimiter_$(openssl rand -hex 16)"
          echo "notes<<$delimiter" >> $GITHUB_OUTPUT
          echo "### What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "_Auto-generated from commit messages_" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MaxSpeedVPN v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes || ' ' }}
          files: |
            artifacts/apk-release/*.apk
            artifacts/linux-release/maxspeed_vpn-linux-x64
            artifacts/windows-release/maxspeed_vpn-windows-x64.zip
            artifacts/macos-arm64-release/maxspeed_vpn-macos-arm64.dmg
            artifacts/macos-x86_64-release/maxspeed_vpn-macos-x86_64.dmg
            artifacts/ios-release/maxspeed_vpn-ios.zip
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


